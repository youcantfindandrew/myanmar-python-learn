name: Supabase Keep-Alive

on:
  schedule:
    # Every 3 days at 08:00 UTC — prevents Supabase free-tier project from pausing
    - cron: '0 8 */3 * *'
  workflow_dispatch: # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app ping endpoint
        run: |
          curl -sf "${{ secrets.APP_URL }}/api/ping" || echo "Ping failed (app may be deploying)"
